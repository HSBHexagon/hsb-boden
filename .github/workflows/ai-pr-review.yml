name: AI PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'functions/**'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.toml'
      - 'astro.config.*'
      - 'tsconfig.*'
      - '.github/workflows/**'
      - '.github/prompts/**'
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: false
        type: string

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  models: read

jobs:
  guard:
    name: Guard / Routing
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.eval.outputs.should_run }}
      should_comment_run: ${{ steps.eval.outputs.should_comment_run }}
    steps:
      - id: eval
        shell: bash
        run: |
          SHOULD_RUN=false
          SHOULD_COMMENT_RUN=false

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.event.pull_request.draft }}" != "true" && "${{ github.actor }}" != "dependabot[bot]" ]]; then
              SHOULD_RUN=true
            fi
          fi

          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            BODY="${{ github.event.comment.body }}"
            if [[ "$BODY" == *"/ai-review"* ]]; then
              SHOULD_COMMENT_RUN=true
            fi
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "should_comment_run=$SHOULD_COMMENT_RUN" >> "$GITHUB_OUTPUT"

  github-models-review:
    name: GitHub Models Review
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should_run == 'true' || needs.guard.outputs.should_comment_run == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Run GitHub Models review
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let prNumber = context.payload.pull_request?.number;
            if (!prNumber && context.payload.issue?.pull_request) {
              prNumber = context.payload.issue.number;
            }
            if (!prNumber && core.getInput('pr_number')) {
              prNumber = Number(core.getInput('pr_number'));
            }
            if (!prNumber) {
              core.setFailed('No PR number found.');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const { data: files } = await github.rest.pulls.listFiles({ owner, repo, pull_number: prNumber, per_page: 100 });
            const diffSummary = files.map(f => `FILE: ${f.filename}\nSTATUS: ${f.status}\nPATCH:\n${f.patch || '[binary or large file omitted]'}`).join('\n\n');
            const prompt = `Review this pull request for HSB Boden (Astro + Cloudflare). Focus on security, Astro/Cloudflare compatibility, SEO regressions, lead endpoint safety, and risky workflow/deploy changes. Use headings BLOCKER, WARNING, SUGGESTION.\n\nPR: ${pr.title}\n\n${diffSummary}`;
            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'openai/gpt-4.1',
                messages: [
                  { role: 'system', content: 'You are a precise senior code reviewer.' },
                  { role: 'user', content: prompt }
                ],
                temperature: 0.2
              })
            });
            if (!response.ok) {
              const text = await response.text();
              core.setFailed(`GitHub Models request failed: ${response.status} ${text}`);
              return;
            }
            const data = await response.json();
            const review = data.choices?.[0]?.message?.content || 'No review returned.';
            const body = `### 🤖 GitHub Models Review\n\n${review}\n\n<sub>Model: openai/gpt-4.1 via GitHub Models</sub>`;
            await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });

  gemini-review:
    name: Gemini 2.5 Pro Review
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Gemini CLI Review
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-2.5-pro
          prompt: |
            Review this pull request for the HSB Boden Astro + Cloudflare codebase.
            Focus on security, Astro/Cloudflare compatibility, SEO regressions,
            lead endpoint integrity, and risky workflow or deploy changes.
            Use headings BLOCKER, WARNING, SUGGESTION.

  chatgpt-review:
    name: ChatGPT GPT-4o Review
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: ChatGPT Code Review
        uses: anc95/ChatGPT-CodeReview@74b4f5ff1e37e00792fa4ae978d77f5d5f4acbc3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: gpt-4o
          top_p: 1
          temperature: 0.2
          language: de
          PROMPT: |
            Reviewe diesen PR-Diff für ein Astro + Cloudflare Projekt.
            Fokus: Lead-API-Sicherheit, TypeScript-Korrektheit,
            Astro-Cloudflare-Kompatibilität, SEO-Regressions,
            riskante Workflow-/Deploy-Änderungen.
            Markiere: BLOCKER | WARNUNG | HINWEIS

  models-eval:
    name: GitHub Models Eval Matrix
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        model:
          - openai/gpt-4.1-mini
          - openai/gpt-4.1
          - mistral-ai/mistral-medium-2505
    steps:
      - name: Run evaluation prompt
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_NAME: ${{ matrix.model }}
        with:
          script: |
            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: process.env.MODEL_NAME,
                messages: [
                  { role: 'system', content: 'You are a concise evaluator.' },
                  { role: 'user', content: 'Summarize in 3 bullets what a safe PR review workflow for Astro + Cloudflare should always check.' }
                ],
                temperature: 0.1
              })
            });
            if (!response.ok) {
              const text = await response.text();
              core.setFailed(`${process.env.MODEL_NAME}: ${response.status} ${text}`);
              return;
            }
            const data = await response.json();
            core.summary.addHeading(`Model ${process.env.MODEL_NAME}`)
              .addCodeBlock(data.choices?.[0]?.message?.content || 'No output')
              .write();

  review-summary:
    name: Review Summary
    runs-on: ubuntu-latest
    needs: [guard, github-models-review, gemini-review, chatgpt-review, models-eval]
    if: always() && (needs.guard.outputs.should_run == 'true' || needs.guard.outputs.should_comment_run == 'true')
    steps:
      - name: Post summary
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let prNumber = context.payload.pull_request?.number;
            if (!prNumber && context.payload.issue?.pull_request) {
              prNumber = context.payload.issue.number;
            }
            if (!prNumber) return;
            const rows = [
              ['GitHub Models', '${{ needs.github-models-review.result }}'],
              ['Gemini', '${{ needs.gemini-review.result }}'],
              ['ChatGPT', '${{ needs.chatgpt-review.result }}'],
              ['Models Eval', '${{ needs.models-eval.result }}']
            ];
            const body = [
              '### 🤖 AI Review Summary',
              '',
              '| Reviewer | Status |',
              '|---|---|',
              ...rows.map(([a,b]) => `| ${a} | ${b} |`),
              '',
              '> Kein Auto-Merge. Kein Production-Deploy. Keine DNS-Änderung.'
            ].join('\n');
            await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
