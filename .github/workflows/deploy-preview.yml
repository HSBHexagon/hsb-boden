name: Deploy Preview

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        # PR previews exercise the lead-form cutover. Runtime delivery still
        # requires the Pages preview secret; this only enables the UI path.
        env:
          PUBLIC_LEAD_FORM_ENABLED: "true"
        run: npm run build

      # Cloudflare Pages (not Workers) is the live architecture since the
      # static-output migration (astro.config.mjs output:"static"). Deploying
      # branch=main via `wrangler pages deploy` becomes the PRODUCTION
      # deployment on Pages, so this only runs for PR branches (safe preview
      # URL) — pushes to main are intentionally NOT deployed here, to keep
      # the manual production gate in deploy-production.yml meaningful.
      - name: Deploy PR preview to Cloudflare Pages
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name hsb-boden --branch="${{ github.head_ref }}"

      - name: Verify Pages deploy (dry run, fork PRs)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: echo "Fork PR — skipping Pages deploy (no secrets available for external contributors). Build above already verifies the static output compiles."
