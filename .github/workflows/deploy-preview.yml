name: Deploy Preview

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: deploy-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy to Cloudflare (Preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers (Preview)
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Top-level wrangler.toml (name=hsb-boden-preview) IS the preview env.
          # No --env flag — adding one silently targets the wrong worker.
          command: deploy

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const deployUrl = '${{ steps.deploy.outputs.deployment-url }}';
            const url = deployUrl || 'https://hsb-boden-preview.workers.dev';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## \u{1F680} Preview Deployment',
                '',
                '| | |',
                '|---|---|',
                `| **URL** | [${url}](${url}) |`,
                `| **Commit** | \`${{ github.sha }}\` |`,
                `| **Branch** | \`${{ github.head_ref }}\` |`
              ].join('\n')
            });
