name: Deploy Production

# Manual gate: per AGENTS.md, production deploys remain blocked until the
# lead pipeline is live and the WordPress site is intentionally cut over.
# Trigger manually from the Actions tab once that condition is met.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: |
          npm run check
          npm run test:run

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers (Production)
        # NOTE: `--env production` is intentionally NOT used.
        # The Astro-6 Cloudflare adapter generates `.wrangler/deploy/config.json`
        # flattened from the top-level wrangler.toml (name=hsb-boden-preview).
        # `--env production` is silently ignored — it deploys to preview, not production.
        # Verified 2026-06-24 via dry-run: `--env production` → ENVIRONMENT=preview.
        # Workaround documented in docs/PHASE_C_CUTOVER_RUNBOOK.md.
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --name hsb-boden --var ENVIRONMENT:production
