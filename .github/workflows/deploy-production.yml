name: Deploy Production

# Manual gate: per AGENTS.md, production deploys remain blocked until the
# lead pipeline is live and the WordPress site is intentionally cut over.
# Trigger manually from the Actions tab once that condition is met.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: |
          npm run check
          npm run test:run

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (Production)
        # Cloudflare Pages is the live architecture since the static-output
        # migration (astro.config.mjs output:"static"); the old Workers
        # deploy target (@astrojs/cloudflare/entrypoints/server) no longer
        # exists in the build output. branch=main is the Pages project's
        # production_branch, so this becomes the live www.hsb-boden.de
        # deployment — this workflow remains workflow_dispatch-only (manual
        # gate preserved).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name hsb-boden --branch=main
