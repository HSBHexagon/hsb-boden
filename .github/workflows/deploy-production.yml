name: Deploy Production

# Manual gate: production deploys stay workflow_dispatch-only. The Pages
# cutover of www.hsb-boden.de is live since 2026-07-09; the gate now exists
# to keep production releases an explicit human decision.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: |
          npm run check
          npm run test:run

      - name: Build
        # PUBLIC_LEAD_FORM_ENABLED is a build-time flag (site.hasLeadEndpoint):
        # without it the LeadForm renders in the disabled phone/mail fallback.
        # Runtime delivery is gated separately by LEAD_WEBHOOK_URL on the
        # Pages production environment.
        env:
          PUBLIC_LEAD_FORM_ENABLED: "true"
        run: npm run build

      - name: Deploy to Cloudflare Pages (Production)
        # Cloudflare Pages is the live architecture since the static-output
        # migration (astro.config.mjs output:"static"); the old Workers
        # deploy target (@astrojs/cloudflare/entrypoints/server) no longer
        # exists in the build output. branch=main is the Pages project's
        # production_branch, so this becomes the live www.hsb-boden.de
        # deployment — this workflow remains workflow_dispatch-only (manual
        # gate preserved).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name hsb-boden --branch=main
