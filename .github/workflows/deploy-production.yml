name: Deploy Production

# Manual gate: production deploys require explicit workflow_dispatch.
# Trigger from the Actions tab once lead pipeline is live and
# WordPress cutover is complete.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true
        default: ''

permissions:
  contents: read

jobs:
  guard:
    name: Deployment Guard
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment intent
        if: github.event.inputs.confirm != 'DEPLOY'
        run: |
          echo "Deployment cancelled: confirmation input was not DEPLOY"
          exit 1

  deploy:
    name: Deploy to Cloudflare (Production)
    runs-on: ubuntu-latest
    needs: guard
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: |
          npm run check
          npm run test:run

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers (Production)
        # [env.production] in wrangler.toml overrides name to hsb-boden,
        # sets workers_dev=false and activates the custom domain routes.
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
