name: Jules / Approved PR Auto-Merge

on:
  pull_request_target:
    types: [labeled, synchronize]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number'
        required: true
        type: string

permissions: {}

concurrency:
  group: approved-auto-merge-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  reset-approval-after-update:
    name: Reset approval after new commits
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Disable auto-merge and remove stale approval labels
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh pr merge "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --disable-auto 2>/dev/null || true

          for label in auto-merge jules-approved; do
            gh pr edit "$PR_NUMBER" \
              --repo "$REPOSITORY" \
              --remove-label "$label" 2>/dev/null || true
          done

          echo "New commits detected on PR #$PR_NUMBER. Auto-merge was disabled and approval labels were removed; fresh approval is required." >> "$GITHUB_STEP_SUMMARY"

  enable-auto-merge:
    name: Enable guarded auto-merge
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.action == 'labeled' &&
        github.event.pull_request.draft == false &&
        (
          github.event.label.name == 'auto-merge' ||
          (
            github.event.label.name == 'jules-approved' &&
            github.event.pull_request.user.login == 'google-labs-jules[bot]'
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve and validate pull request
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
          TRIGGER_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          PR_NUMBER="${EVENT_PR_NUMBER:-${INPUT_PR_NUMBER:-}}"
          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid pull request number: $PR_NUMBER" >&2
            exit 1
          fi

          PERMISSION="$({
            gh api "repos/$REPOSITORY/collaborators/$TRIGGER_ACTOR/permission" \
              --jq '.permission'
          } 2>/dev/null || true)"

          case "$PERMISSION" in
            admin|maintain|write)
              ;;
            *)
              echo "Actor '$TRIGGER_ACTOR' has '$PERMISSION' permission and cannot authorize auto-merge." >&2
              exit 1
              ;;
          esac

          PR_JSON="$(
            gh pr view "$PR_NUMBER" \
              --repo "$REPOSITORY" \
              --json state,isDraft,baseRefName,headRefOid,author,labels
          )"

          STATE="$(jq -r '.state' <<<"$PR_JSON")"
          IS_DRAFT="$(jq -r '.isDraft' <<<"$PR_JSON")"
          BASE_BRANCH="$(jq -r '.baseRefName' <<<"$PR_JSON")"
          HEAD_SHA="$(jq -r '.headRefOid' <<<"$PR_JSON")"
          AUTHOR="$(jq -r '.author.login' <<<"$PR_JSON")"
          HAS_AUTO_MERGE="$(jq -r '[.labels[].name] | index("auto-merge") != null' <<<"$PR_JSON")"
          HAS_JULES_APPROVAL="$(jq -r '[.labels[].name] | index("jules-approved") != null' <<<"$PR_JSON")"

          if [[ "$STATE" != "OPEN" ]]; then
            echo "PR #$PR_NUMBER is not open." >&2
            exit 1
          fi

          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "PR #$PR_NUMBER is still a draft." >&2
            exit 1
          fi

          if [[ "$BASE_BRANCH" != "main" ]]; then
            echo "PR #$PR_NUMBER targets '$BASE_BRANCH', not 'main'." >&2
            exit 1
          fi

          if [[ "$HAS_AUTO_MERGE" != "true" ]]; then
            if [[ "$AUTHOR" != "google-labs-jules[bot]" || "$HAS_JULES_APPROVAL" != "true" ]]; then
              echo "PR #$PR_NUMBER lacks an authorized auto-merge approval label." >&2
              exit 1
            fi
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Enable GitHub native auto-merge
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --auto \
            --squash \
            --match-head-commit "$HEAD_SHA"

          echo "Auto-merge enabled for PR #$PR_NUMBER at head $HEAD_SHA. Any later commit requires fresh approval." >> "$GITHUB_STEP_SUMMARY"
