name: "🚀 Notion Deploy Sync"

# Läuft nach jedem erfolgreichen Deploy (production & preview)
# Schreibt Deploy-Status, SHA, URL und Timestamp direkt in Notion
on:
  workflow_run:
    workflows:
      - "Deploy Production"
      - "Deploy Preview"
    types:
      - completed

permissions:
  contents: read

jobs:
  sync-to-notion:
    name: Sync Deploy Status → Notion
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install Notion SDK
        run: npm install --no-save --ignore-scripts @notionhq/client@4.0.2

      - name: Sync Deploy to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DEPLOY_DB_ID: ${{ secrets.NOTION_DEPLOY_DB_ID }}
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_STATUS: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          node << 'EOF'
          const { Client } = require('@notionhq/client');
          const notion = new Client({ auth: process.env.NOTION_TOKEN });

          const status = process.env.WORKFLOW_STATUS === 'success' ? '✅ Erfolgreich' : '❌ Fehlgeschlagen';
          const env = process.env.BRANCH === 'main' ? 'Production' : 'Preview';
          const shortSha = process.env.GITHUB_SHA.substring(0, 7);
          const now = new Date().toISOString();

          async function main() {
            await notion.pages.create({
              parent: { database_id: process.env.NOTION_DEPLOY_DB_ID },
              properties: {
                'Name': { title: [{ text: { content: `Deploy ${shortSha} → ${env}` } }] },
                'Status': { select: { name: status } },
                'Umgebung': { select: { name: env } },
                'Branch': { rich_text: [{ text: { content: process.env.BRANCH || 'main' } }] },
                'Commit SHA': { rich_text: [{ text: { content: shortSha } }] },
                'Workflow': { rich_text: [{ text: { content: process.env.WORKFLOW_NAME } }] },
                'Action URL': { url: process.env.WORKFLOW_URL },
                'Deployed At': { date: { start: now } },
              }
            });
            console.log(`✅ Notion aktualisiert: Deploy ${shortSha} → ${env} (${status})`);
          }

          main().catch(err => {
            console.error('❌ Notion Sync fehlgeschlagen:', err.message);
            process.exit(1);
          });
          EOF
