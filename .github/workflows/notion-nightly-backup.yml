name: "💾 Notion Nightly Backup"

# Läuft täglich um 02:00 Uhr CET (01:00 UTC)
# Exportiert alle Notion-Datenbankeinträge als JSON nach GitHub
# Kostenlos: GitHub Actions Free Tier = 2000 Min/Monat
on:
  schedule:
    - cron: '0 1 * * *'   # 02:00 CET = 01:00 UTC
  workflow_dispatch:       # Manuell auslösbar

permissions:
  contents: write

jobs:
  backup-notion:
    name: Backup Notion → GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Notion SDK
        run: npm install @notionhq/client

      - name: Run Notion Backup
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DEPLOY_DB_ID: ${{ secrets.NOTION_DEPLOY_DB_ID }}
          NOTION_ISSUES_DB_ID: ${{ secrets.NOTION_ISSUES_DB_ID }}
        run: |
          mkdir -p .notion-backup
          node << 'EOF'
          const { Client } = require('@notionhq/client');
          const fs = require('fs');
          const path = require('path');
          const notion = new Client({ auth: process.env.NOTION_TOKEN });

          const databases = [
            { id: process.env.NOTION_DEPLOY_DB_ID, name: 'hsb-deploys' },
            { id: process.env.NOTION_ISSUES_DB_ID, name: 'hsb-issues' },
          ].filter(db => db.id);

          async function backupDatabase(dbId, name) {
            const results = [];
            let cursor;

            do {
              const res = await notion.databases.query({
                database_id: dbId,
                start_cursor: cursor,
                page_size: 100,
              });
              results.push(...res.results);
              cursor = res.has_more ? res.next_cursor : undefined;
            } while (cursor);

            const today = new Date().toISOString().split('T')[0];
            const filePath = path.join('.notion-backup', `${name}-${today}.json`);
            fs.writeFileSync(filePath, JSON.stringify(results, null, 2));
            console.log(`✅ Backup: ${name} (${results.length} Einträge) → ${filePath}`);
            return results.length;
          }

          async function main() {
            let total = 0;
            for (const db of databases) {
              const count = await backupDatabase(db.id, db.name);
              total += count;
            }

            // Zusammenfassung schreiben
            const summary = {
              timestamp: new Date().toISOString(),
              databases: databases.length,
              total_entries: total,
              status: '✅ Erfolg'
            };
            fs.writeFileSync('.notion-backup/summary.json', JSON.stringify(summary, null, 2));
            console.log(`\n📊 Gesamt: ${total} Einträge aus ${databases.length} Datenbanken gesichert`);
          }

          main().catch(err => {
            console.error('❌ Backup fehlgeschlagen:', err.message);
            process.exit(1);
          });
          EOF

      - name: Commit Backup to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Notion Backup Bot"
          git add .notion-backup/
          if git diff --staged --quiet; then
            echo "Keine Änderungen im Backup - nichts zu committen"
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "backup(notion): nightly backup ${TODAY}"
            git push
            echo "✅ Backup committed und gepusht"
          fi
