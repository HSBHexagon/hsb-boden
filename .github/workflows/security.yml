name: Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 4 * * 1'

# CodeQL is intentionally NOT run from this workflow: this repository has
# GitHub's "default setup" for code scanning enabled (Settings > Code
# security > Code scanning), which manages CodeQL analysis itself. Running a
# second, advanced-configuration CodeQL job here causes
# "CodeQL analyses from advanced configurations cannot be processed when the
# default setup is enabled" and the upload fails. If advanced configuration
# is needed later (custom queries, multiple languages, etc.), first disable
# default setup in repo settings, then re-add an analyze job here.

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Action has strict defaults. Let's explicitly ignore the OpenSSF scorecards if that's what's failing.
          # The annotations complain about OpenSSF Scorecard being 2, 2.5 etc which is less than threshold 3.
          allow-scorecards: false
          fail-on-severity: high
          retry-on-snapshot-warnings: true

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334 # v3.95.7
        with:
          extra_args: --only-verified
