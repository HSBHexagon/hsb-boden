name: Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 4 * * 1'

# CodeQL is intentionally NOT run from this workflow: this repository has
# GitHub's "default setup" for code scanning enabled (Settings > Code
# security > Code scanning), which manages CodeQL analysis itself. Running a
# second, advanced-configuration CodeQL job here causes
# "CodeQL analyses from advanced configurations cannot be processed when the
# default setup is enabled" and the upload fails. If advanced configuration
# is needed later (custom queries, multiple languages, etc.), first disable
# default setup in repo settings, then re-add an analyze job here.

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          extra_args: --only-verified
