name = "hsb-boden-preview"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true

[vars]
ENVIRONMENT = "preview"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "placeholder-preview"

[env.production]
name = "hsb-boden"
workers_dev = true
preview_urls = true
# routes = [
#   { pattern = "hsb-boden.de/*", zone_name = "hsb-boden.de" },
#   { pattern = "www.hsb-boden.de/*", zone_name = "hsb-boden.de" }
# ]

[env.production.assets]
directory = "./dist"
binding = "ASSETS"

[env.production.observability]
enabled = true

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "placeholder-production"
