name = "hsb-boden"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true

[vars]
ENVIRONMENT = "preview"

[env.production]
name = "hsb-boden"
workers_dev = true
preview_urls = true
