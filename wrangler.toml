#   { pattern = "hsb-boden.de/*", zone_name = "hsb-boden.de" },
#   { pattern = "www.hsb-boden.de/*", zone_name = "hsb-boden.de" }
# ]

[env.production.assets]
directory = "./dist"
binding = "ASSETS"

[env.production.observability]
enabled = true

[env.production.vars]
ENVIRONMENT = "production"
